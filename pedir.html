<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fazer um Pedido - PontoCerto</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --ink: #1C2118; --ink-soft: #3D4A2E; --cream: #F7F4EC; --cream-deep: #EFEADB; --sage: #8A9A5B; --sage-deep: #5F6E3D; --clay: #B8895E; --clay-deep: #8E6443; --line: rgba(28, 33, 24, 0.12); --font-display: "Fraunces", Georgia, serif; --font-body: "Inter", -apple-system, sans-serif; --font-mono: "Space Mono", monospace; --shadow-3d: 0 34px 80px rgba(28, 33, 24, 0.18), 0 10px 24px rgba(28, 33, 24, 0.10); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font-body); background: var(--cream); color: var(--ink); line-height: 1.6; }
        .container { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
        a { color: inherit; text-decoration: none; }
        h1, h2, h3 { font-family: var(--font-display); font-weight: 500; color: var(--ink); }
        
        .site-header { padding: 20px 0; border-bottom: 1px solid var(--line); background: rgba(247, 244, 236, 0.9); }
        .logo { font-family: var(--font-display); font-size: 21px; font-weight: 600; }
        
        .pedido-section { padding: 80px 0; text-align: center; }
        .section-eyebrow { font-family: var(--font-mono); font-size: 13px; text-transform: uppercase; color: var(--clay-deep); margin-bottom: 14px; }
        .form-wrapper { max-width: 640px; margin: 0 auto; background: var(--cream-deep); border: 1px solid var(--line); border-radius: 24px; padding: 44px; box-shadow: var(--shadow-3d); text-align: left; }
        .form-wrapper h3 { font-size: 32px; margin-bottom: 24px; text-align: center; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 14.5px; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; border: 1px solid var(--line); border-radius: 12px; font-family: var(--font-body); font-size: 15px; }
        
        @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; gap: 0; } }

        .btn-primary { background: var(--ink); color: var(--cream); padding: 15px 28px; border-radius: 999px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn-primary:hover { background: var(--ink-soft); }

        .form-divider { border-top: 1px dashed var(--line); margin: 30px 0; }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo"><i class="fa-solid fa-location-dot"></i> PontoCerto</a>
        </div>
    </header>

    <section class="pedido-section">
        <div class="container">
            <div class="section-eyebrow">SIMULAR PEDIDO</div>
            
            <div class="form-wrapper">
                <h3>Faça o seu pedido</h3>
                <form id="form-pedido" onsubmit="enviarPedido(event)">
                    
                    <div class="form-group">
                        <label>O seu Nome</label>
                        <input type="text" id="txt_nome" placeholder="Ex: Maria Silva" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>O seu Email</label>
                            <input type="email" id="txt_email" placeholder="Para receber os avisos" required>
                        </div>
                        <div class="form-group">
                            <label>O seu Telemóvel</label>
                            <input type="tel" id="txt_telefone" placeholder="Para o profissional ligar" required>
                        </div>
                    </div>

                    <div class="form-divider"></div>

                    <div class="form-group">
                        <label>O que precisa? (Título)</label>
                        <input type="text" id="txt_titulo" placeholder="Ex: Limpeza de terreno de 400m2" required>
                    </div>
                    <div class="form-group">
                        <label>Tipo de Serviço</label>
                        <select id="sel_tipo">
                            <option value="Limpeza de Terreno">Limpeza de Terreno</option>
                            <option value="Jardinagem Geral">Jardinagem Geral</option>
                            <option value="Poda / Abate">Poda / Abate de Árvores</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Explique os detalhes (Descrição)</label>
                        <textarea id="txt_descricao" rows="4" placeholder="Ex: Preciso que cortem as silvas e limpem o entulho antes do verão." required></textarea>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> Enviar Pedido
                    </button>
                </form>
            </div>
            
        </div>
    </section>

    <!-- ========================================== -->
    <!-- MOTORES PREMIUM: EmailJS e SweetAlert2     -->
    <!-- ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // Ligar a tua conta EmailJS (Public Key)
        emailjs.init("UrnlxHD-Mo4izdIh6");
    </script>

    <script>
        const SUPABASE_URL = 'https://ighogfphrheldebeuftr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_5U6QW765VDQOau9w5ZbSIg_Pk988KWj';

        const baseDados = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function enviarPedido(event) {
            event.preventDefault();
            
            // Buscar os novos campos de contacto
            const nomeInput = document.getElementById('txt_nome').value;
            const emailInput = document.getElementById('txt_email').value;
            const telefoneInput = document.getElementById('txt_telefone').value;
            
            // Buscar os campos de serviço
            const tituloInput = document.getElementById('txt_titulo').value;
            const descricaoInput = document.getElementById('txt_descricao').value;
            const tipoInput = document.getElementById('sel_tipo').value;
            
            const botaoBotao = event.target.querySelector('button');
            
            botaoBotao.textContent = "A guardar pedido...";
            botaoBotao.disabled = true;

            // Enviar tudo para as novas colunas no Supabase
            const { data, error } = await baseDados.from('pedidos').insert([
                { 
                    nome_cliente: nomeInput,
                    email_cliente: emailInput,
                    telefone_cliente: telefoneInput,
                    titulo: tituloInput, 
                    descricao: descricaoInput, 
                    tipo_servico: tipoInput 
                }
            ]).select();

            if (error) {
                console.error("Erro do Supabase:", error);
                alert('Erro ao enviar pedido. Verificaste se criaste as novas colunas no Supabase (nome_cliente, email_cliente, telefone_cliente)?');
                botaoBotao.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Pedido';
                botaoBotao.disabled = false;
            } else {
                
                // ==========================================
                // INÍCIO DO SISTEMA DE EMAIL PREMIUM
                // ==========================================
                const pedidoGuardado = data[0]; 

                // 1. Preparar o pacote com as variáveis exatas do template EmailJS
                const dadosEmail = {
                    nome_cliente: pedidoGuardado.nome_cliente,
                    email_cliente: pedidoGuardado.email_cliente,
                    titulo_servico: pedidoGuardado.titulo,
                    id_pedido: pedidoGuardado.id
                };

                // 2. Disparar o email de forma invisível
                emailjs.send("service_xqo1u2b", "template_gpwoicq", dadosEmail)
                    .then(() => console.log("Email Premium enviado com sucesso!"))
                    .catch((erro) => console.error("Erro silencioso no email:", erro));

                // 3. Mostrar o Pop-up Premium ao Cliente
                Swal.fire({
                    title: "Pedido Recebido! 🎉",
                    html: `O seu número de acompanhamento é o <b>#${pedidoGuardado.id}</b>.<br><br>Enviámos-lhe um email com todos os detalhes.`,
                    icon: "success",
                    confirmButtonColor: "#1C2118", // Usa a cor 'ink' do teu site
                    confirmButtonText: "Acompanhar Pedido",
                    allowOutsideClick: false // Impede que ele feche o aviso sem querer
                }).then((result) => {
                    if (result.isConfirmed) {
                        // Limpa o formulário, repõe o botão e leva-o para o rastreio
                        document.getElementById('form-pedido').reset();
                        botaoBotao.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Pedido';
                        botaoBotao.disabled = false;
                        window.location.href = "rastrear.html";
                    }
                });
                // ==========================================
                // FIM DO SISTEMA DE EMAIL PREMIUM
                // ==========================================
                
            }
        }
    </script>
</body>
</html>
