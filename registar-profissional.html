<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junta-te a Nós - PontoCerto</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --ink: #1C2118; --cream: #F7F4EC; --sage: #8A9A5B; --clay: #B8895E; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--cream); color: var(--ink); padding: 40px 20px; display: flex; justify-content: center; }
        
        .container { background: white; max-width: 600px; width: 100%; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h1 { font-family: 'Fraunces', serif; color: var(--clay); font-size: 32px; margin-bottom: 8px; text-align: center; }
        p.subtitulo { text-align: center; opacity: 0.7; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input[type="text"], input[type="email"], input[type="tel"], select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 15px; }
        
        input[type="file"] { border: 1px dashed var(--sage); padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; background: rgba(138, 154, 91, 0.05); }
        
        .btn-submit { background: var(--ink); color: var(--cream); border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: var(--clay); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Junta-te à PontoCerto</h1>
        <p class="subtitulo">Preenche os teus dados para avaliarmos a tua candidatura.</p>

        <form id="form-candidatura">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João Silva">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="Ex: joao@email.com">
            </div>

            <div class="form-group">
                <label>Telemóvel</label>
                <input type="tel" id="telemovel" required placeholder="Ex: 912345678">
            </div>

            <div class="form-group">
                <label>Especialidade Principal</label>
                <select id="especialidade" required>
                    <option value="">Escolhe uma opção...</option>
                    <option value="Jardineiro Geral">Jardineiro Geral</option>
                    <option value="Podador de Árvores">Podador de Árvores</option>
                    <option value="Limpeza de Terrenos">Limpeza de Terrenos</option>
                </select>
            </div>

            <div class="form-group">
                <label>Currículo (PDF, JPG ou PNG)</label>
                <input type="file" id="curriculo" accept=".pdf, .jpg, .jpeg, .png" required>
            </div>

            <button type="submit" id="btn-enviar" class="btn-submit">Enviar Candidatura</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://ighogfphrheldebeuftr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_5U6QW765VDQOau9w5ZbSIg_Pk988KWj';
        const baseDados = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('form-candidatura').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const botao = document.getElementById('btn-enviar');
            botao.textContent = "A enviar ficheiro...";
            botao.disabled = true;
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telemovel = document.getElementById('telemovel').value;
            const especialidade = document.getElementById('especialidade').value;
            const ficheiroInput = document.getElementById('curriculo');
            const ficheiro = ficheiroInput.files[0];

            try {
                const extensao = ficheiro.name.split('.').pop();
                const nomeFicheiroUnico = `${Date.now()}_${nome.replace(/\s+/g, '')}.${extensao}`;

                const { data: uploadData, error: uploadError } = await baseDados
                    .storage
                    .from('Curriculos')
                    .upload(nomeFicheiroUnico, ficheiro);

                if (uploadError) throw new Error("Erro ao guardar o ficheiro no cofre.");

                botao.textContent = "A guardar dados...";

                const { error: dbError } = await baseDados
                    .from('profissionais')
                    .insert([{
                        nome: nome,
                        email: email,
                        telemovel: telemovel,
                        especialidade: especialidade,
                        curriculo_url: uploadData.path,
                        aprovado: false
                    }]);

                if (dbError) throw new Error("Erro ao guardar os dados na tabela.");

                // Apenas Pop-up de Sucesso (O EmailJS foi removido daqui)
                Swal.fire({
                    title: "Candidatura Recebida! 🚀",
                    html: `Obrigado, <b>${nome}</b>.<br><br>Já recebemos os teus dados. A nossa equipa vai analisar o teu perfil e entrará em contacto muito em breve.`,
                    icon: "success",
                    confirmButtonColor: "#1C2118",
                    confirmButtonText: "Voltar à Página Principal",
                    allowOutsideClick: false
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = "index.html"; 
                    }
                });

            } catch (erro) {
                console.error(erro);
                Swal.fire({ title: "Ops!", text: erro.message, icon: "error", confirmButtonColor: "#1C2118" });
                botao.textContent = "Enviar Candidatura";
                botao.disabled = false;
            }
        });
    </script>
</body>
</html>
