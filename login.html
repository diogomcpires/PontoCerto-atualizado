<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoCerto - Aceder à Conta</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1C2118; --cream: #F7F4EC; --sage: #8A9A5B; --clay: #B8895E; }
        body { font-family: 'Inter', sans-serif; background-color: var(--cream); color: var(--ink); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid rgba(0,0,0,0.05); }
        h1 { font-family: 'Fraunces', serif; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        button { width: 100%; padding: 14px; background: var(--ink); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #3D4A2E; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .footer-links a { color: var(--clay); text-decoration: none; font-weight: 600; }
        #msg-erro { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 15px; display: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="titulo">Entrar na Conta</h1>
        <div id="msg-erro"></div>
        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group" id="nome-group" style="display:none;">
                <label>Nome Completo</label>
                <input type="text" id="nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" id="password" required minlength="6">
                <!-- Link adicionado aqui -->
                <a href="recuperar.html" id="link-recuperar" style="display: block; text-align: right; font-size: 13px; color: var(--clay); margin-top: 8px; font-weight: 500; text-decoration: none;">
                    Esqueci-me da palavra-passe
                </a>
            </div>
            <button type="submit" id="btn-submit">Entrar</button>
        </form>
        <div class="footer-links">
            <span id="texto-alternativo">Ainda não tem conta?</span> 
            <a href="#" onclick="toggleMode(event)" id="link-alternativo">Criar conta</a>
        </div>
        <div class="footer-links" style="margin-top: 15px;">
            <a href="index.html" style="color: var(--ink);">← Voltar ao site</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ighogfphrheldebeuftr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_5U6QW765VDQOau9w5ZbSIg_Pk988KWj';
        
        const supabaseBase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogin = true;

        function toggleMode(e) {
            e.preventDefault();
            isLogin = !isLogin;
            document.getElementById('titulo').innerText = isLogin ? "Entrar na Conta" : "Criar Conta";
            document.getElementById('btn-submit').innerText = isLogin ? "Entrar" : "Registar";
            document.getElementById('texto-alternativo').innerText = isLogin ? "Ainda não tem conta?" : "Já tem conta?";
            document.getElementById('link-alternativo').innerText = isLogin ? "Criar conta" : "Entrar";
            
            document.getElementById('nome-group').style.display = isLogin ? "none" : "block";
            document.getElementById('nome').required = !isLogin; 
            document.getElementById('msg-erro').style.display = 'none'; 
            
            // Esconde o link de recuperar a password quando está a criar conta
            document.getElementById('link-recuperar').style.display = isLogin ? "block" : "none";
        }

        async function handleAuth(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg-erro');
            const btn = document.getElementById('btn-submit');
            
            msg.style.display = 'none';
            btn.innerText = 'A processar...';
            btn.disabled = true;
            
            try {
                if (isLogin) {
                    // MODO: LOGAR
                    const { data, error } = await supabaseBase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // VERIFICAÇÃO (Lista VIP com Espiões)
                    console.log("1. A procurar este email na tabela prof_aprovados:", email);

                    const { data: aprovado, error: erroVIP } = await supabaseBase
                        .from('prof_aprovados')
                        .select('email')
                        .eq('email', email);
                    
                    console.log("2. O que o Supabase encontrou:", aprovado);
                    if (erroVIP) console.error("3. Erro do Supabase:", erroVIP);
                    
                    if (aprovado && aprovado.length > 0) {
                        console.log("4. SUCESSO! É VIP. A redirecionar para o painel...");
                        window.location.href = "profissional.html";
                    } else {
                        console.log("4. FALHOU. Não encontrou na lista. A redirecionar para o index...");
                        window.location.href = "index.html"; 
                    }
                } else {
                    // MODO: REGISTAR
                    const nome = document.getElementById('nome').value;
                    const { error } = await supabaseBase.auth.signUp({ 
                        email, password, options: { data: { nome_completo: nome } } 
                    });
                    
                    if (error) throw error;
                    
                    alert("Conta criada com sucesso! Já pode fazer login."); 
                    toggleMode(e); 
                }
            } catch (error) {
                msg.style.display = 'block'; 
                if (error.message === "Invalid login credentials") {
                    msg.innerText = "Email ou palavra-passe incorretos.";
                } else if (error.message === "User already registered") {
                    msg.innerText = "Este email já tem conta criada.";
                } else {
                    msg.innerText = "Ocorreu um erro. Tente novamente.";
                }
            } finally {
                btn.innerText = isLogin ? "Entrar" : "Registar";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
