<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Trabalhos - PontoCerto</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --ink: #1C2118; --ink-light: #2A3224; --cream: #F7F4EC; --sage: #8A9A5B; --clay: #B8895E; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: var(--ink); color: var(--cream); line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header-painel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid rgba(247, 244, 236, 0.1); padding-bottom: 20px; }
        .header-painel h1 { font-family: "Fraunces", serif; font-size: 32px; color: var(--clay); }
        .btn-voltar { color: var(--cream); text-decoration: none; font-size: 14px; opacity: 0.8; }
        
        h2.seccao-titulo { font-family: "Fraunces", serif; color: var(--sage); margin: 40px 0 20px; font-size: 24px; border-bottom: 1px dashed rgba(138, 154, 91, 0.3); padding-bottom: 10px; }
        
        .grid-trabalhos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .cartao-trabalho { background: var(--ink-light); border: 1px solid rgba(247, 244, 236, 0.1); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; }
        .cartao-topo { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .tag-tipo { background: rgba(138, 154, 91, 0.2); color: var(--sage); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        
        .cartao-trabalho h3 { font-family: "Fraunces", serif; font-size: 22px; margin-bottom: 8px; }
        .cartao-trabalho p { font-size: 15px; opacity: 0.8; margin-bottom: 20px; flex-grow: 1; }
        .cartao-trabalho strong { display: block; margin-bottom: 10px; font-size: 13px; color: var(--clay); }
        
        .btn-aceitar { background: var(--sage); color: var(--ink); border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-aceitar:hover { background: #9db267; }
        
        /* NOVO ESTILO DO BOTÃO CONCLUIR */
        .btn-concluir { background: transparent; color: var(--clay); border: 2px solid var(--clay); padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-concluir:hover { background: var(--clay); color: var(--cream); }
        
        .aviso-vazio { opacity: 0.5; font-style: italic; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div class="container">
        <header class="header-painel">
            <h1><i class="fa-solid fa-person-digging"></i> O Meu Painel</h1>
            <a href="index.html" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i> Sair do Painel</a>
        </header>

        <h2 class="seccao-titulo">Novos Pedidos na sua Zona</h2>
        <div id="lista-pendentes" class="grid-trabalhos">A carregar...</div>

        <h2 class="seccao-titulo" style="color: var(--clay);">Trabalhos em Curso (Aceites)</h2>
        <div id="lista-aceites" class="grid-trabalhos">A carregar...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ighogfphrheldebeuftr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_5U6QW765VDQOau9w5ZbSIg_Pk988KWj';
        const baseDados = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // VERIFICAR SEGURANÇA LOGO AO INÍCIO
        async function verificarSeguranca() {
            const { data } = await baseDados.auth.getSession();
            if (!data.session) window.location.href = "login.html";
            else carregarTrabalhos();
        }

        async function carregarTrabalhos() {
            const divPendentes = document.getElementById('lista-pendentes');
            const divAceites = document.getElementById('lista-aceites');

            const { data: pedidos, error } = await baseDados.from('pedidos').select('*').order('id', { ascending: false });

            divPendentes.innerHTML = '';
            divAceites.innerHTML = '';

            let countPendentes = 0;
            let countAceites = 0;

            if (pedidos) {
                pedidos.forEach(pedido => {
                    const estado = pedido.estado ? pedido.estado.toUpperCase() : 'PENDENTE';
                    
                    // Se estiver concluído, o cartão nem sequer é desenhado no ecrã (desaparece)
                    if (estado === 'CONCLUIDO') return; 

                    const isAceite = estado === 'ACEITE';
                    
                    // Se estiver aceite, mostra o botão "Concluir Trabalho"
                    let htmlBotao = isAceite 
                        ? `<button class="btn-concluir" onclick="concluirTrabalho(event, ${pedido.id})"><i class="fa-solid fa-check-double"></i> Concluir Trabalho</button>` 
                        : `<button class="btn-aceitar" onclick="aceitarTrabalho(event, ${pedido.id})">Aceitar Trabalho</button>`;

                    const cartao = `
                        <div class="cartao-trabalho">
                            <div class="cartao-topo">
                                <span class="tag-tipo">${pedido.tipo_servico || 'Serviço'}</span>
                                <span style="font-family: monospace; opacity: 0.5;">ID: #${pedido.id}</span>
                            </div>
                            <h3>${pedido.titulo}</h3>
                            <p>${pedido.descricao}</p>
                            ${htmlBotao}
                        </div>
                    `;

                    if (isAceite) {
                        divAceites.innerHTML += cartao;
                        countAceites++;
                    } else {
                        divPendentes.innerHTML += cartao;
                        countPendentes++;
                    }
                });
            }

            if (countPendentes === 0) divPendentes.innerHTML = '<div class="aviso-vazio">Não há novos pedidos de momento.</div>';
            if (countAceites === 0) divAceites.innerHTML = '<div class="aviso-vazio">Ainda não aceitou nenhum trabalho.</div>';
        }

        async function aceitarTrabalho(event, id) {
            event.target.textContent = "A aceitar...";
            const { error } = await baseDados.from('pedidos').update({ estado: 'aceite' }).eq('id', id);
            if (!error) carregarTrabalhos();
            else alert("Erro ao aceitar.");
        }

        // NOVA FUNÇÃO: CONCLUIR TRABALHO
        async function concluirTrabalho(event, id) {
            event.target.textContent = "A finalizar...";
            const { error } = await baseDados.from('pedidos').update({ estado: 'concluido' }).eq('id', id);
            if (!error) carregarTrabalhos();
            else alert("Erro ao concluir.");
        }

        verificarSeguranca();
    </script>
</body>
</html>
