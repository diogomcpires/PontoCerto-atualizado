<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Administração - PontoCerto</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --ink: #1C2118; --cream: #F7F4EC; --sage: #8A9A5B; --clay: #B8895E; --red: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--cream); color: var(--ink); padding: 40px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        h1 { font-family: 'Fraunces', serif; color: var(--ink); font-size: 32px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
        
        .cartao { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .cartao h3 { color: var(--clay); font-size: 20px; margin-bottom: 12px; }
        .cartao p { margin-bottom: 8px; font-size: 14px; }
        .cartao strong { font-weight: 600; color: var(--ink); }
        
        /* Novos estilos para os botões lado a lado */
        .btn-acoes { display: flex; gap: 10px; margin-top: 16px; }
        
        .btn-aprovar, .btn-recusar { 
            border: none; padding: 12px; border-radius: 8px; font-size: 14px; 
            font-weight: 600; cursor: pointer; transition: 0.2s; flex: 1; color: white;
        }
        
        .btn-aprovar { background: var(--sage); }
        .btn-aprovar:hover { background: #6b7a42; }
        
        .btn-recusar { background: var(--red); opacity: 0.9; }
        .btn-recusar:hover { opacity: 1; }
        
        .mensagem-vazio { text-align: center; color: #666; font-size: 18px; margin-top: 50px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Painel de Aprovação</h1>
        <p>Candidatos Pendentes</p>
    </div>

    <div id="lista-candidatos" class="grid">
        <!-- Os candidatos vão aparecer aqui automaticamente -->
    </div>
    <div id="vazio" class="mensagem-vazio">Não há profissionais pendentes no momento. 🎉</div>

    <script>
        // Inicializar EmailJS
        emailjs.init("UrnlxHD-Mo4izdIh6");

        // Inicializar Supabase
        const SUPABASE_URL = 'https://ighogfphrheldebeuftr.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_5U6QW765VDQOau9w5ZbSIg_Pk988KWj';
        const baseDados = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para carregar quem está pendente
        async function carregarPendentes() {
            const grid = document.getElementById('lista-candidatos');
            const vazio = document.getElementById('vazio');
            grid.innerHTML = ''; 

            const { data, error } = await baseDados.from('profissionais').select('*').eq('aprovado', false);

            if (error) {
                console.error(error);
                return;
            }

            if (data.length === 0) {
                vazio.style.display = 'block';
            } else {
                vazio.style.display = 'none';
                data.forEach(prof => {
                    const urlCurriculo = `${SUPABASE_URL}/storage/v1/object/public/Curriculos/${prof.curriculo_url}`;
                    
                    const cartao = document.createElement('div');
                    cartao.className = 'cartao';
                    cartao.innerHTML = `
                        <h3>${prof.nome}</h3>
                        <p><strong>Especialidade:</strong> ${prof.especialidade}</p>
                        <p><strong>Email:</strong> ${prof.email}</p>
                        <p><strong>Telemóvel:</strong> ${prof.telemovel}</p>
                        <p><strong>Currículo:</strong> <a href="${urlCurriculo}" target="_blank" style="color: var(--clay);">Ver Documento</a></p>
                        
                        <div class="btn-acoes">
                            <button class="btn-aprovar" onclick="aprovarProfissional(${prof.id}, '${prof.nome}', '${prof.email}')">✓ Aprovar</button>
                            <button class="btn-recusar" onclick="recusarProfissional(${prof.id}, '${prof.nome}')">✗ Recusar</button>
                        </div>
                    `;
                    grid.appendChild(cartao);
                });
            }
        }

        // Função de Aprovar
        async function aprovarProfissional(id, nome, email) {
            Swal.fire({
                title: 'A processar...',
                text: 'A aprovar candidato e a enviar email...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });

            try {
                const { error: updateError } = await baseDados.from('profissionais').update({ aprovado: true }).eq('id', id);
                if (updateError) throw updateError;

                // ATENÇÃO: NÃO TE ESQUEÇAS DE COLAR AQUI O TEU TEMPLATE ID DE APROVAÇÃO
                const templateAprovacao = "COLA_AQUI_O_TEU_NOVO_TEMPLATE_DE_APROVACAO"; 
                
                await emailjs.send("service_xqo1u2b", templateAprovacao, {
                    nome_profissional: nome,
                    email_profissional: email
                });

                Swal.fire('Aprovado!', `${nome} foi aceite com sucesso.`, 'success');
                carregarPendentes();
            } catch (erro) {
                console.error(erro);
                Swal.fire('Erro', 'Ocorreu um erro ao aprovar o profissional.', 'error');
            }
        }

        // Função NOVA de Recusar (Apaga a linha do Supabase)
        async function recusarProfissional(id, nome) {
            const confirmacao = await Swal.fire({
                title: 'Recusar Candidato?',
                text: `Tem a certeza que deseja eliminar a candidatura de ${nome}? Esta ação não pode ser desfeita.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e74c3c',
                cancelButtonColor: '#95a5a6',
                confirmButtonText: 'Sim, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (confirmacao.isConfirmed) {
                Swal.fire({ title: 'A apagar...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

                try {
                    const { error } = await baseDados.from('profissionais').delete().eq('id', id);
                    if (error) throw error;

                    Swal.fire('Eliminado!', 'A candidatura foi removida.', 'success');
                    carregarPendentes();
                } catch (erro) {
                    console.error(erro);
                    Swal.fire('Erro', 'Ocorreu um erro ao eliminar a candidatura.', 'error');
                }
            }
        }

        // Iniciar
        carregarPendentes();
    </script>
</body>
</html>
